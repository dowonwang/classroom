info:
  name: sign-up
  type: http
  seq: 1

http:
  method: POST
  url: "{{process.env.BASE_URL}}/auth/sign-up"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "member@member.com",
        "name": "member",
        "password": "member"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
