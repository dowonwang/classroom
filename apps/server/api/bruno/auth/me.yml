info:
  name: me
  type: http
  seq: 3

http:
  method: GET
  url: "{{process.env.BASE_URL}}/auth/me"
  auth:
    type: bearer
    token: "{{ACCESS_TOKEN}}"

runtime:
  scripts:
    - type: before-request
      code: |-
        const accessToken = bru.getEnvVar("ACCESS_TOKEN");

        if(!accessToken) throw new Error("Access token missing.\nRun the 'sign-in' request to automatically save a new one.");

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
