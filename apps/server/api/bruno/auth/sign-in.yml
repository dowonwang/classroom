info:
  name: sign-in
  type: http
  seq: 2

http:
  method: POST
  url: "{{process.env.BASE_URL}}/auth/sign-in"
  body:
    type: json
    data: |-
      {
        "email": "test@test.com",
        "password": "tester1234"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const resStatus = res.getStatus();

        if(resStatus === 200) {
          const accessToken = res.getBody().data.accessToken;
          
          bru.setEnvVar("ACCESS_TOKEN", accessToken);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
