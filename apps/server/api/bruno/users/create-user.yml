info:
  name: create-user
  type: http
  seq: 1

http:
  method: POST
  url: '{{process.env.BASE_URL}}/users'
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "test@test.com",
        "name": "tester",
        "role": "STUDENT",
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
